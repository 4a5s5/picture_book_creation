interface:
  display_name: "Independent Picture Book Generation"
  short_description: "Create children's picture books from natural language through the bundled API workflow."
  default_prompt: "Use $independent-image-generation when the user asks in natural language to create a children's picture book, such as 制作一个关于恐龙的儿童绘本, 生成一本小熊情绪管理绘本, or create a 16-page bedtime storybook. Execute scripts/image_workflow_cli.py run-topic or run with a long enough timeout; do not hand-write story output or reuse old task results if the CLI fails. If a run leaves only .task.lock or no task_state.json, run diagnose-task and cleanup-lock before retrying."
